name: Build and Deploy (Cloud Run & Firebase Hosting)

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - 'client/**'
      - 'firebase.json'
      - '.firebaserc'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID || 'gdrive-music-player-da3ea' }}
  REGION: ${{ secrets.GCP_REGION || 'us-central1' }}
  REPOSITORY: ${{ secrets.GCP_AR_REPOSITORY || 'cloud-music-player' }}
  SERVICE: ${{ secrets.GCP_SERVICE_NAME || 'music-player-backend' }}

jobs:
  deploy-backend:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest
    # Optional: Only run if server files actually changed (useful if both are in same repo)
    outputs:
      server_changed: ${{ steps.filter.outputs.server }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Filter Server Changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            server:
              - 'server/**'
              - '.github/workflows/deploy.yml'

      - name: Authenticate to Google Cloud
        if: steps.filter.outputs.server == 'true'
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        if: steps.filter.outputs.server == 'true'
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        if: steps.filter.outputs.server == 'true'
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build, Tag, and Push Docker Image
        if: steps.filter.outputs.server == 'true'
        run: |
          IMAGE_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }}"
          docker build -t $IMAGE_TAG ./server
          docker push $IMAGE_TAG
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Deploy to Cloud Run Service
        if: steps.filter.outputs.server == 'true'
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE_TAG }}
          flags: |
            --min-instances=0
            --allow-unauthenticated

      - name: Deploy to Cloud Run Indexer Job
        if: steps.filter.outputs.server == 'true'
        run: |
          IMAGE_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }}"
          gcloud run jobs update music-indexer \
            --image=$IMAGE_TAG \
            --command="node" \
            --args="dist/indexer.js" \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --quiet

  deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Filter Client Changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            client:
              - 'client/**'
              - 'firebase.json'
              - '.firebaserc'
              - '.github/workflows/deploy.yml'

      - name: Set up Node.js
        if: steps.filter.outputs.client == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: './client/package-lock.json'

      - name: Install Client Dependencies
        if: steps.filter.outputs.client == 'true'
        run: |
          npm ci
        working-directory: ./client

      - name: Build React App
        if: steps.filter.outputs.client == 'true'
        run: |
          npm run build
        working-directory: ./client
        env:
          VITE_OAUTH_CLIENT_ID: ${{ secrets.VITE_OAUTH_CLIENT_ID }}
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL || 'https://music-player-backend-140585753373.us-central1.run.app' }}
          VITE_GCS_INDEX_URL: ${{ secrets.VITE_GCS_INDEX_URL || 'https://storage.googleapis.com/gdrive-music-player-bucket/index.json' }}

      - name: Authenticate to Firebase
        if: steps.filter.outputs.client == 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GDRIVE_MUSIC_PLAYER_DA3EA }}

      - name: Deploy to Firebase Hosting
        if: steps.filter.outputs.client == 'true'
        run: |
          set +e
          npx firebase-tools@15.22.3 deploy --only hosting --project "${FIREBASE_PROJECT_ID}" --non-interactive 2>&1 | tee firebase-deploy.log
          status=${PIPESTATUS[0]}
          set -e

          if [ "$status" -ne 0 ]; then
            if grep -q "is the current active version" firebase-deploy.log; then
              echo "Firebase Hosting already made this version active; treating retry response as success."
              exit 0
            fi

            exit "$status"
          fi
